name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools
          working-directory: RDesk

      - name: Install RTools
        run: |
          choco install rtools -y
          echo "C:\rtools44\usr\bin" >> $GITHUB_PATH
          echo "C:\rtools44\mingw64\bin" >> $GITHUB_PATH

      - name: Build App and Installer
        run: |
          Rscript -e 'devtools::install(".", quiet = TRUE)'
          Rscript -e 'RDesk::build_app(app_dir = "inst/apps/mtcars_dashboard", app_name = "CarsAnalyser", build_installer = TRUE)'
        working-directory: RDesk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: RDesk ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          files: |
            RDesk/dist/*.zip
            RDesk/dist/*-setup.exe
