name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    env:
      RENV_PATHS_LIBRARY: renv/library
      RENV_CONFIG_AUTOLOADER_ENABLED: false
      RENV_CONFIG_SNAPSHOT_TYPE: explicit
      RENV_CONFIG_BIOCONDUCTOR_VERSION: ""

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'
          use-public-rspm: true

      - name: Cache renv packages
        uses: actions/cache@v4
        with:
          path: renv/library
          key: renv-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: renv-${{ runner.os }}-

      - name: Restore renv environment
        run: |
          if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          renv::restore(prompt = FALSE, clean = FALSE)
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::rcmdcheck, any::withr

      - name: Verify Rtools and Compilation
        shell: Rscript {0}
        run: |
          source("renv/activate.R")
          devtools::install(pkg = ".", upgrade = FALSE, quick = TRUE)
          launcher <- system.file("bin", "rdesk-launcher.exe", package = "RDesk")
          if (launcher == "" || !file.exists(launcher)) {
            stop("Launcher binary not found after installation!")
          }
          cat("Launcher verified at: ", launcher, "\n")

      - name: Build App Bundle
        shell: Rscript {0}
        run: |
          source("renv/activate.R")
          # Create a fresh app using the real scaffolding engine
          RDesk::rdesk_create_app("CarsDashboard", path = "C:/Temp")
          # Build the newly created app
          RDesk::build_app(app_dir = "C:/Temp/CarsDashboard", app_name = "CarsDashboard", version = "${{ github.ref_name }}")

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
