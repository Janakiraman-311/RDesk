name: release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::callr, any::mirai
          pak-version: repo

      - name: Install Rtools
        run: |
          choco install rtools --version=4.5.6768 -y --allow-downgrade
          echo "C:\rtools45\usr\bin" >> $GITHUB_PATH
          echo "C:\rtools45\x86_64-w64-mingw32.static.posix\bin" >> $GITHUB_PATH

      - name: Ensure CMake is available
        run: |
          $cmake = Get-Command cmake -ErrorAction SilentlyContinue
          if (-not $cmake) {
            choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          }
          Get-Command cmake -ErrorAction Stop | Select-Object -ExpandProperty Source

      - name: Verify build tools
        run: |
          g++ --version
          gcc --version
          cmake --version

      - name: Prepare WebView2 SDK
        run: |
          [xml]$nuspec = Get-Content launcher_src\launcher\webview2_sdk\Microsoft.Web.WebView2.nuspec
          $wvVersion = $nuspec.package.metadata.version
          $zip = Join-Path $env:RUNNER_TEMP "webview2-sdk-$wvVersion.zip"
          $extract = Join-Path $env:RUNNER_TEMP "webview2-sdk-$wvVersion"
          Invoke-WebRequest "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/$wvVersion" -OutFile $zip
          if (Test-Path $extract) { Remove-Item -Recurse -Force $extract }
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          Copy-Item "$extract\\build" launcher_src\launcher\webview2_sdk\build -Recurse -Force
          Copy-Item "$extract\\runtimes" launcher_src\launcher\webview2_sdk\runtimes -Recurse -Force

      - name: Build launcher assets
        run: |
          cmd /c launcher_src\launcher\build_launcher.bat
          if ($LASTEXITCODE -ne 0) { throw "Launcher build failed." }
          Copy-Item launcher_src\launcher\webview2_sdk\runtimes\win-x64\native\WebView2Loader.dll inst\bin\WebView2Loader.dll -Force

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build App and Installer
        run: |
          Rscript -e 'install.packages(".", repos = NULL, type = "source")'
          Rscript -e 'RDesk::build_app(app_dir = "inst/apps/mtcars_dashboard", app_name = "CarsAnalyser", build_installer = TRUE, portable_r_method = "installer")'

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: RDesk ${{ github.ref_name }}
          generate_release_notes: true
          draft: true
          files: |
            dist/*.zip
            dist/*-setup.exe
