name: build-app

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::rcmdcheck

      - name: Verify async dependencies
        run: |
          Rscript -e 'stopifnot(requireNamespace("callr", quietly = TRUE), requireNamespace("processx", quietly = TRUE))'

      - name: Install RTools
        run: |
          choco install rtools --version=4.5.1.0 -y --allow-downgrade
          echo "C:\rtools45\usr\bin" >> $GITHUB_PATH
          echo "C:\rtools45\x86_64-w64-mingw32.static.posix\bin" >> $GITHUB_PATH

      - name: Build App
        run: |
          Rscript -e 'devtools::install(".", quiet = TRUE)'
          Rscript -e 'RDesk::build_app(app_dir = "inst/apps/mtcars_dashboard", app_name = "CarsAnalyser")'

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CarsAnalyser-dist
          path: dist/*
          retention-days: 30
