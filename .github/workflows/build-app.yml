name: build-app

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    env:
      RENV_PATHS_LIBRARY: renv/library
      RENV_CONFIG_AUTOLOADER_ENABLED: false
      RENV_CONFIG_SNAPSHOT_TYPE: explicit
      RENV_CONFIG_BIOCONDUCTOR_VERSION: ""

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'
          use-public-rspm: true

      - name: Cache renv packages
        uses: actions/cache@v4
        with:
          path: renv/library
          key: renv-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: renv-${{ runner.os }}-

      - name: Restore renv environment
        run: |
          if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          renv::restore(prompt = FALSE, clean = FALSE)
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::rcmdcheck, any::withr

      - name: Verify Rtools and Compilation
        shell: Rscript {0}
        run: |
          source("renv/activate.R")
          # This triggers Makevars.win compilation of the launcher
          devtools::install(pkg = ".", upgrade = FALSE, quick = TRUE)
          
          # Verify binary was built and placed in inst/bin (dev-mode copy)
          # OR that it's in the installed package library
          launcher <- system.file("bin", "rdesk-launcher.exe", package = "RDesk")
          if (launcher == "" || !file.exists(launcher)) {
            stop("Launcher binary not found after installation!")
          }
          cat("Launcher verified at: ", launcher, "\n")

      - name: Build App
        shell: Rscript {0}
        run: |
          source("renv/activate.R")
          # build_app will now find the launcher inside the installed package RDesk
          RDesk::build_app(
            app_dir = "inst/apps/mtcars_dashboard", 
            app_name = "CarsAnalyser", 
            portable_r_method = "installer"
          )

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CarsAnalyser-dist
          path: dist/*
          retention-days: 30
