name: build-app

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    env:
      RENV_PATHS_LIBRARY: renv/library
      RENV_CONFIG_AUTOLOADER_ENABLED: false
      RENV_CONFIG_SNAPSHOT_TYPE: explicit
      RENV_CONFIG_BIOCONDUCTOR_VERSION: ""

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - name: Cache renv packages
        uses: actions/cache@v4
        with:
          path: renv/library
          key: renv-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: renv-${{ runner.os }}-

      - name: Restore renv environment
        run: |
          if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          renv::restore(prompt = FALSE, clean = FALSE)
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::devtools, any::rcmdcheck

      - name: Install and Map Rtools
        run: |
          choco install rtools --version=4.5.6768 -y --allow-downgrade
          $rtools = Get-ChildItem -Path C:\ -Filter "rtools*" -Directory | Select-Object -First 1
          if ($rtools) {
            echo "Found Rtools at $($rtools.FullName)"
            echo "$($rtools.FullName)\usr\bin" >> $GITHUB_PATH
            echo "$($rtools.FullName)\x86_64-w64-mingw32.static.posix\bin" >> $GITHUB_PATH
          } else {
            throw "Rtools 4.5 not found in C:\"
          }

      - name: Ensure CMake is available
        run: |
          $cmake = Get-Command cmake -ErrorAction SilentlyContinue
          if (-not $cmake) {
            choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          }
          Get-Command cmake -ErrorAction Stop | Select-Object -ExpandProperty Source

      - name: Verify build tools
        run: |
          g++ --version
          gcc --version
          cmake --version

      - name: Prepare WebView2 SDK
        run: |
          [xml]$nuspec = Get-Content launcher_src\launcher\webview2_sdk\Microsoft.Web.WebView2.nuspec
          $wvVersion = $nuspec.package.metadata.version
          $zip = Join-Path $env:RUNNER_TEMP "webview2-sdk-$wvVersion.zip"
          $extract = Join-Path $env:RUNNER_TEMP "webview2-sdk-$wvVersion"
          Invoke-WebRequest "https://www.nuget.org/api/v2/package/Microsoft.Web.WebView2/$wvVersion" -OutFile $zip
          if (Test-Path $extract) { Remove-Item -Recurse -Force $extract }
          Expand-Archive -Path $zip -DestinationPath $extract -Force
          Copy-Item "$extract\build" launcher_src\launcher\webview2_sdk\build -Recurse -Force
          Copy-Item "$extract\runtimes" launcher_src\launcher\webview2_sdk\runtimes -Recurse -Force

      - name: Build launcher assets
        run: |
          cmd /c launcher_src\launcher\build_launcher.bat
          if ($LASTEXITCODE -ne 0) { throw "Launcher build failed." }
          Copy-Item launcher_src\launcher\webview2_sdk\runtimes\win-x64\native\WebView2Loader.dll inst\bin\WebView2Loader.dll -Force

      - name: Verify async stack
        run: |
          Rscript -e "
            options(rdesk.async_backend = 'callr')
            install.packages('.', repos = NULL, type = 'source', quiet = TRUE)
            library(RDesk)
            stopifnot(requireNamespace('callr'), requireNamespace('mirai'))
            fn <- RDesk::async(function(p) list(result = p[['x']] * 2))
            cat('async() wrapper created successfully\n')
          "

      - name: Build App
        run: |
          Rscript -e "RDesk::build_app(app_dir = 'inst/apps/mtcars_dashboard', app_name = 'CarsAnalyser', portable_r_method = 'installer')"

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CarsAnalyser-dist
          path: dist/*
          retention-days: 30
