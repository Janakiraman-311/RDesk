name: build-app

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck

      - uses: r-lib/actions/setup-rtools@v2

      - name: Build App
        run: |
          R CMD INSTALL .
          Rscript -e "options(rdesk.async_backend = 'callr'); library(RDesk); fn <- RDesk::async(function(p) list(result = p$x * 2)); attr_env <- attr(fn, 'rdesk_msg_type_env'); if (!is.null(attr_env)) attr_env$type <- 'test'; cat('async() wrapper created successfully\n')"
          Rscript -e "RDesk::build_app(app_dir = 'inst/apps/mtcars_dashboard', app_name = 'CarsAnalyser', portable_r_method = 'installer')"

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CarsAnalyser-dist
          path: dist/*
          retention-days: 30
