name: build-app

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::callr, any::mirai
          pak-version: repo

      - name: Install Rtools
        run: |
          choco install rtools --version=4.5.6768 -y --allow-downgrade
          echo "C:\rtools45\usr\bin" >> $GITHUB_PATH
          echo "C:\rtools45\x86_64-w64-mingw32.static.posix\bin" >> $GITHUB_PATH

      - name: Build launcher assets
        run: |
          cmd /c launcher_src\launcher\build_launcher.bat
          New-Item -ItemType Directory -Force -Path inst\bin | Out-Null
          Copy-Item launcher_src\launcher\webview2_sdk\build\native\x64\WebView2Loader.dll inst\bin\WebView2Loader.dll -Force

      - name: Build App
        run: |
          Rscript -e "install.packages('.', repos = NULL, type = 'source')"
          Rscript -e "options(rdesk.async_backend = 'callr'); library(RDesk); fn <- RDesk::async(function(p) list(result = p$x * 2)); attr_env <- attr(fn, 'rdesk_msg_type_env'); if (!is.null(attr_env)) attr_env$type <- 'test'; cat('async() wrapper created successfully\n')"
          Rscript -e "RDesk::build_app(app_dir = 'inst/apps/mtcars_dashboard', app_name = 'CarsAnalyser', portable_r_method = 'installer')"

      - name: Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CarsAnalyser-dist
          path: dist/*
          retention-days: 30
