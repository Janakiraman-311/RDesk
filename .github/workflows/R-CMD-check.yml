name: R-CMD-check

on:
  push:
    branches: [ main, "*" ]
  pull_request:
    branches: [ main ]

jobs:
  R-CMD-check:
    runs-on: windows-latest
    env:
      RENV_PATHS_LIBRARY: renv/library
      RENV_CONFIG_AUTOLOADER_ENABLED: false
      RENV_CONFIG_SNAPSHOT_TYPE: explicit
      RENV_CONFIG_BIOCONDUCTOR_VERSION: ""

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'
          use-public-rspm: true

      - name: Cache renv packages
        uses: actions/cache@v4
        with:
          path: renv/library
          key: renv-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: renv-${{ runner.os }}-

      - name: Restore renv environment
        run: |
          if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          renv::restore(prompt = FALSE, clean = FALSE)
        shell: Rscript {0}

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::withr

      - name: Run R-CMD-check
        run: |
          # The check will automatically trigger src/Makevars.win via R CMD INSTALL
          if (!requireNamespace("rcmdcheck", quietly = TRUE)) install.packages("rcmdcheck")
          res <- rcmdcheck::rcmdcheck(
            args = c("--no-manual", "--as-cran"),
            error_on = "warning",
            check_dir = "check"
          )
          if (length(res$errors) > 0 || length(res$warnings) > 0) {
            stop("Check failed with errors or warnings")
          }
        shell: Rscript {0}

      - name: Upload check results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: check-results
          path: check
