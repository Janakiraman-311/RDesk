on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

name: pkgdown

jobs:
  pkgdown:
    # RDesk is an OS_type: Windows package. Site building requires RDesk installation 
    # to run vignettes (library(RDesk)), so we must build on a Windows runner.
    runs-on: windows-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'
          use-public-rspm: true

      - name: Restore renv
        run: |
          if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
          options(repos = c(CRAN = "https://cloud.r-project.org"))
          renv::restore(prompt = FALSE, clean = FALSE)
        shell: Rscript {0}

      - name: Install RDesk
        # devtools is not in renv.lock; use base R CMD INSTALL instead
        # which builds and installs the package from source with no extra deps.
        run: R CMD INSTALL .
        shell: cmd

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        # Using peaceiris instead of JamesIves to avoid rsync path resolution issues on Windows
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_push: true
          # Preserve existing branch history if desired, but site builds are usually overrides
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
